<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BJ Manager Pro | Bubeelive AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: #111827;
            --accent-primary: #6366f1;
            --accent-secondary: #4f46e5;
            --accent-success: #10b981;
            --accent-danger: #ef4444;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #1f2937;
            --glass-bg: rgba(17, 24, 39, 0.7);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', 'Pretendard', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(79, 70, 229, 0.1) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            margin: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Action Bar */
        .action-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            padding: 1.5rem;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            position: sticky;
            top: 2rem;
            z-index: 100;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            animation: fadeInUp 0.8s ease-out;
        }

        .search-box {
            flex: 1;
            position: relative;
        }

        .search-box input {
            width: 100%;
            background: #030712;
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            transition: var(--transition);
        }

        .search-box input:focus {
            border-color: var(--accent-primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .btn {
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-primary { background: var(--accent-primary); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -5px var(--accent-primary); }

        .btn-secondary { background: var(--border-color); color: var(--text-main); }
        .btn-secondary:hover { background: #374151; }

        /* BJ List */
        .bj-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            animation: fadeInUp 1s ease-out;
        }

        .bj-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .bj-card:hover {
            transform: scale(1.02);
            border-color: var(--accent-primary);
            box-shadow: 0 20px 40px -20px rgba(0,0,0,0.5);
        }

        .bj-info h3 { font-size: 1.25rem; margin-bottom: 0.25rem; }
        .bj-info p { font-size: 0.875rem; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
        .badge {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 6px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent-primary);
            font-weight: 800;
            text-transform: uppercase;
        }
        .badge.live {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-danger);
            animation: pulse 2s infinite;
        }

        .btn-del-mini {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.2rem;
        }

        .btn-del-mini:hover { background: var(--accent-danger); color: white; transform: rotate(90deg); }

        /* Modal */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: var(--card-bg);
            width: 90%;
            max-width: 500px;
            border-radius: 32px;
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.8);
        }

        .modal-title { font-size: 1.75rem; font-weight: 800; margin-bottom: 2rem; color: var(--accent-primary); }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; font-size: 0.875rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem; }
        .form-input {
            width: 100%;
            background: #030712;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
        }
        select.form-input {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
        
        .modal-btns { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn-modal { flex: 1; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; border: none; font-size: 1rem; }
        .btn-save { background: var(--accent-primary); color: white; }
        .btn-cancel { background: #374151; color: white; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Loading Spinner */
        .loader { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>BJ Manager Pro</h1>
        <p>Bubeelive AI 통합 비제이 관리 전용 센터</p>
    </header>

    <div class="action-bar">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="비제이 이름 또는 ID 검색..." oninput="filterList()">
        </div>
        <button class="btn btn-secondary" onclick="window.open('/commands.html', '_blank')">📖 명령어 가이드</button>
        <button class="btn btn-secondary" onclick="fetchList()">🔄 새로고침</button>
        <button class="btn btn-primary" onclick="openModal()">+ 비제이 등록</button>
    </div>

    <div id="bjGrid" class="bj-grid">
        <div class="empty-state">
            <div class="loader" style="margin: 0 auto 1.5rem;"></div>
            <p>비제이 명단을 불러오는 중...</p>
        </div>
    </div>
</div>

<!-- Add Modal -->
<div id="addOverlay" class="overlay">
    <div class="modal">
        <div class="modal-title" id="modalTitle">비제이 등록</div>
        
        <div id="singleMode">
            <div class="form-group">
                <label class="form-label">등록 타입</label>
                <select id="bjType" class="form-input">
                    <option value="user_key">유저 고유 ID (권장 - 방번호가 바뀌어도 추적)</option>
                    <option value="vod_key">방 번호 (현재 라이브 중인 방)</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">ID / 방 번호 (숫자)</label>
                <input type="text" id="bjId" class="form-input" placeholder="예: 123456">
            </div>
            <div class="form-group">
                <label class="form-label">비제이 닉네임 (메모용)</label>
                <input type="text" id="bjName" class="form-input" placeholder="예: 홍길동">
            </div>
        </div>

        <div class="modal-btns">
            <button class="btn-modal btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn-modal btn-save" id="btnSubmit" onclick="submitAdd()">등록하기</button>
        </div>
    </div>
</div>

<script>
    let fullList = [];

    window.onload = () => {
        fetchList();
    };

    async function fetchList() {
        const grid = document.getElementById('bjGrid');
        try {
            const res = await fetch('/api/targets');
            const data = await res.json();
            
            fullList = data.targets || [];
            const liveRooms = data.activeRooms || [];
            
            // 라이브 상태 마킹
            fullList.forEach(item => {
                item.isLive = liveRooms.includes(Number(item.id)) || liveRooms.includes(String(item.id));
            });

            renderList(fullList);
        } catch (e) {
            grid.innerHTML = '<div class="empty-state">❌ 목록을 불러오지 못했습니다. 서버 상태를 확인해주세요.</div>';
        }
    }

    function renderList(list) {
        const grid = document.getElementById('bjGrid');
        grid.innerHTML = '';
        
        if (list.length === 0) {
            grid.innerHTML = '<div class="empty-state">등록된 비제이가 없습니다. 우측 상단의 등록 버튼을 눌러 추가해주세요.</div>';
            return;
        }

        list.forEach((info) => {
            const card = document.createElement('div');
            card.className = 'bj-card';
            
            // Default settings mapping (backward compatible)
            const defaultSettings = { autoWelcome: false, autoAttendance: false, enableCommands: true };
            const settings = { ...defaultSettings, ...(info.settings || {}) };
            
            card.innerHTML = `
                <div class="bj-info">
                    <h3>${info.name || '알수없음'}</h3>
                    <p>ID: ${info.id} 
                        <span class="badge ${info.isLive ? 'live' : ''}">${info.type === 'vod_key' ? '방번호' : '유저ID'}</span>
                        ${info.isLive ? '<span class="badge live">LIVE O/A</span>' : ''}
                    </p>
                    <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color);">
                        <div style="display: flex; gap: 15px; font-size: 0.9rem; align-items: center;">
                            <label style="display:flex; align-items:center; gap:5px; cursor:pointer;">
                                <input type="checkbox" onchange="updateSetting('${info.id}', 'autoAttendance', this.checked)" ${settings.autoAttendance ? 'checked' : ''}> 
                                <span>자동 출석</span>
                            </label>
                            <label style="display:flex; align-items:center; gap:5px; cursor:pointer;">
                                <input type="checkbox" onchange="updateSetting('${info.id}', 'autoWelcome', this.checked)" ${settings.autoWelcome ? 'checked' : ''}> 
                                <span>자동 인사</span>
                            </label>
                            <label style="display:flex; align-items:center; gap:5px; cursor:pointer;">
                                <input type="checkbox" onchange="updateSetting('${info.id}', 'enableCommands', this.checked)" ${settings.enableCommands ? 'checked' : ''}> 
                                <span>명령어 반응(!)</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="btn-del-mini" onclick="deleteBj('${info.id}', '${info.name}')">×</div>
            `;
            grid.appendChild(card);
        });
    }

    async function updateSetting(id, key, value) {
        try {
            const res = await fetch(`/api/targets/${id}/settings`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ [key]: value })
            });
            if (!res.ok) alert('설정 변경에 실패했습니다.');
        } catch (e) {
            alert('서버 연결 실패');
        }
    }

    function filterList() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = fullList.filter(info => {
            return String(info.id).includes(query) || (info.name && info.name.toLowerCase().includes(query));
        });
        renderList(filtered);
    }

    function openModal() {
        document.getElementById('bjId').value = '';
        document.getElementById('bjName').value = '';
        document.getElementById('addOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('addOverlay').style.display = 'none';
    }

    async function submitAdd() {
        const type = document.getElementById('bjType').value;
        const id = document.getElementById('bjId').value.trim();
        const name = document.getElementById('bjName').value.trim();
        
        if (!id || !name) return alert("ID와 이름을 모두 입력해주세요.");
        if (isNaN(id)) return alert("ID는 숫자만 입력 가능합니다.");

        document.getElementById('btnSubmit').innerText = "처리 중...";
        
        try {
            const res = await fetch('/api/targets', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: Number(id), name, type })
            });
            
            if (res.ok) {
                alert(`[${name}] 등록 완료!`);
                closeModal();
                fetchList();
            } else {
                const err = await res.json();
                alert(`등록 실패: ${err.message || '알 수 없는 오류'}`);
            }
        } catch (e) { 
            alert("서버 연결 실패"); 
        } finally {
            document.getElementById('btnSubmit').innerText = "등록하기";
        }
    }

    async function deleteBj(id, name) {
        if (!confirm(`[${name}(${id})] 비제이를 삭제하시겠습니까?`)) return;

        try {
            const res = await fetch(`/api/targets/${id}`, { method: 'DELETE' });
            if (res.ok) {
                alert(`삭제 완료되었습니다.`);
                fetchList();
            } else {
                alert("삭제 실패");
            }
        } catch (e) { 
            alert("서버 연결 실패"); 
        }
    }
</script>

</body>
</html>
