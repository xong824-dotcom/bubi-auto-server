<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BJ Manager Pro | Bubeelive AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: #111827;
            --accent-primary: #6366f1;
            --accent-secondary: #4f46e5;
            --accent-success: #10b981;
            --accent-danger: #ef4444;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #1f2937;
            --glass-bg: rgba(17, 24, 39, 0.7);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', 'Pretendard', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(79, 70, 229, 0.1) 0%, transparent 50%);
        }

        .container { width: 100%; max-width: 1000px; padding: 2rem; margin: 2rem; }
        header { text-align: center; margin-bottom: 3rem; animation: fadeInDown 0.8s ease-out; }
        header h1 { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, #818cf8, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        header p { color: var(--text-muted); font-size: 1.1rem; }
        
        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; font-size: 0.875rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem; }
        .form-input { width: 100%; background: #030712; border: 1px solid var(--border-color); border-radius: 14px; padding: 14px; color: white; font-size: 1rem; font-family: inherit; }
        .form-input:focus { border-color: var(--accent-primary); outline: none; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }
        select.form-input { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; }
        textarea.form-input { min-height: 100px; resize: vertical; }

        .btn { padding: 12px 24px; border-radius: 14px; font-weight: 700; cursor: pointer; border: none; transition: var(--transition); display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; font-size: 1rem;}
        .btn-primary { background: var(--accent-primary); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -5px var(--accent-primary); }
        .btn-secondary { background: var(--border-color); color: var(--text-main); }
        .btn-secondary:hover { background: #374151; }
        .btn-danger { background: rgba(239,68,68,0.2); color: var(--accent-danger); border: 1px solid var(--accent-danger); }
        .btn-danger:hover { background: var(--accent-danger); color: white; }
        .btn-block { width: 100%; }

        /* Login Screen */
        .login-box { max-width: 400px; margin: 5rem auto; text-align: center; }
        
        /* Master Screen */
        .bj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .bj-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 1.5rem; transition: var(--transition); }
        .bj-card:hover { transform: scale(1.02); border-color: var(--accent-primary); box-shadow: 0 20px 40px -20px rgba(0,0,0,0.5); }
        .bj-info h3 { font-size: 1.25rem; margin-bottom: 0.25rem; }
        .bj-info p { font-size: 0.875rem; color: var(--text-muted); }
        .badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 6px; background: rgba(99, 102, 241, 0.1); color: var(--accent-primary); font-weight: 800; }
        .badge.live { background: rgba(239, 68, 68, 0.1); color: var(--accent-danger); animation: pulse 2s infinite; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        
        /* Tabs */
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; overflow-x: auto; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 1.1rem; font-weight: 600; cursor: pointer; padding: 0.5rem 1rem; transition: var(--transition); border-radius: 12px; }
        .tab-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
        .tab-btn.active { color: var(--accent-primary); background: rgba(99, 102, 241, 0.15); }
        
        /* List Items */
        .list-item { background: #030712; border: 1px solid var(--border-color); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .list-info strong { color: var(--accent-primary); font-size: 1.1rem; margin-right: 0.5rem; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container" id="app"></div>

<script>
    let token = localStorage.getItem('bubi_token') || null;
    let role = localStorage.getItem('bubi_role') || null;
    let targetId = localStorage.getItem('bubi_id') || null;
    
    // DB Cache
    let botDB = { customCmds: {}, notices: [], settings: {} };

    const app = document.getElementById('app');

    function render() {
        if (!token) {
            renderLogin();
        } else if (role === 'master') {
            renderMaster();
        } else if (role === 'bj') {
            renderBJ();
        }
    }

    function logout() {
        localStorage.clear();
        token = null; role = null; targetId = null;
        render();
    }

    // ==========================================
    // 1. LOGIN SCREEN
    // ==========================================
    function renderLogin() {
        app.innerHTML = `
            <header>
                <h1>BJ Manager Pro</h1>
                <p>부비라이브 통합 봇 관리 대시보드</p>
            </header>
            <div class="card login-box">
                <h2 style="margin-bottom:1.5rem;">로그인</h2>
                <div class="form-group">
                    <label class="form-label">아이디 (ID)</label>
                    <input type="text" id="loginId" class="form-input" placeholder="고유방번호">
                </div>
                <div class="form-group">
                    <label class="form-label">비밀번호 (Password)</label>
                    <input type="password" id="loginPw" class="form-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter') doLogin()">
                </div>
                <button class="btn btn-primary btn-block" onclick="doLogin()">접속하기</button>
            </div>
        `;
    }

    async function doLogin() {
        const id = document.getElementById('loginId').value.trim();
        const pw = document.getElementById('loginPw').value.trim();
        if (!id || !pw) return alert('입력해주세요.');
        
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, password: pw })
            });
            const data = await res.json();
            
            if (data.success) {
                token = data.token;
                role = data.role;
                targetId = id;
                localStorage.setItem('bubi_token', token);
                localStorage.setItem('bubi_role', role);
                localStorage.setItem('bubi_id', targetId);
                render();
            } else {
                alert(data.message);
            }
        } catch (e) { alert('서버 연결 실패'); }
    }

    // ==========================================
    // 2. MASTER SCREEN
    // ==========================================
    async function renderMaster() {
        app.innerHTML = `
            <header>
                <h1>Master Dashboard</h1>
                <p>모든 BJ 봇 관리 화면</p>
                <br>
                <button class="btn btn-secondary" onclick="logout()">로그아웃</button>
            </header>
            <div class="card">
                <h2 style="margin-bottom:1rem;">신규 봇 추가</h2>
                <div style="display:flex; gap:1rem; flex-wrap:wrap;">
                    <select id="newType" class="form-input" style="flex:1;">
                        <option value="user_key">고유 아이디(user_key)</option>
                        <option value="vod_key">현재방송 방번호(vod_key)</option>
                    </select>
                    <input type="text" id="newId" class="form-input" style="flex:2;" placeholder="방 번호 또는 고유 아이디">
                    <input type="text" id="newName" class="form-input" style="flex:2;" placeholder="BJ 이름 (선택)">
                    <input type="text" id="newPw" class="form-input" style="flex:2;" placeholder="초기 비밀번호 부여">
                    <button class="btn btn-primary" onclick="addBJ()">추가하기</button>
                </div>
            </div>
            <div id="bjListContainer" class="bj-grid">로딩 중...</div>
        `;
        fetchMasterList();
    }

    async function fetchMasterList() {
        try {
            const res = await fetch('/api/targets');
            const data = await res.json();
            const active = data.activeRooms || [];
            let html = '';
            
            data.targets.forEach(t => {
                const isLive = active.includes(String(t.id));
                html += `
                <div class="bj-card">
                    <div class="flex-between" style="margin-bottom:1rem;">
                        <div class="bj-info">
                            <h3>${t.name} <span class="badge ${isLive ? 'live' : ''}">${isLive ? '라이브러닝중' : '대기중'}</span></h3>
                            <p>ID: ${t.id} | PW: ${t.password || '1234'}</p>
                        </div>
                        <button class="btn btn-danger" onclick="deleteBJ(${t.id}, '${t.name}')">삭제</button>
                    </div>
                    <div style="background:#030712; padding:10px; border-radius:10px; border:1px solid #1f2937; margin-top:10px; font-size: 0.9rem; color: #9ca3af;">
                        <label style="margin-right:15px; cursor:pointer;"><input type="checkbox" onchange="toggleSettingMaster(${t.id}, 'enableCommands', this.checked)" ${t.settings && t.settings.enableCommands !== false ? 'checked' : ''}> 봇 작동</label>
                        <label style="margin-right:15px; cursor:pointer;"><input type="checkbox" onchange="toggleSettingMaster(${t.id}, 'autoWelcome', this.checked)" ${t.settings && t.settings.autoWelcome !== false ? 'checked' : ''}> 자동 인사</label>
                        <label style="cursor:pointer;"><input type="checkbox" onchange="toggleSettingMaster(${t.id}, 'autoAttendance', this.checked)" ${t.settings && t.settings.autoAttendance !== false ? 'checked' : ''}> 출석 반응</label>
                    </div>
                </div>
                `;
            });
            document.getElementById('bjListContainer').innerHTML = html || '<p>등록된 BJ가 없습니다.</p>';
        } catch (e) {
            document.getElementById('bjListContainer').innerHTML = '<p>불러오기 실패</p>';
        }
    }

    async function addBJ() {
        const type = document.getElementById('newType').value;
        const id = document.getElementById('newId').value.trim();
        let name = document.getElementById('newName').value.trim();
        if (!name) name = "홍길동";
        const pw = document.getElementById('newPw').value.trim();
        if (!id || !pw) return alert('아이디와 초기 비밀번호를 입력해주세요.');
        
        try {
            const res = await fetch('/api/targets', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, name, type, password: pw })
            });
            if (res.ok) fetchMasterList();
            else alert((await res.json()).message);
        } catch (e) { alert('실패'); }
    }

    async function deleteBJ(id, name) {
        if (!confirm(`[${name}] 비제이 봇을 목록에서 삭제하시겠습니까?`)) return;
        await fetch(`/api/targets/${id}`, { method: 'DELETE' });
        fetchMasterList();
    }

    async function toggleSettingMaster(id, key, value) {
        try {
            await fetch(`/api/targets/${id}/settings`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ [key]: value })
            });
        } catch (e) { alert('설정 변경 실패'); }
    }

    // ==========================================
    // 3. BJ CLIENT SCREEN
    // ==========================================
    let currentTab = 'settings';

    async function renderBJ() {
        // Fetch DB first
        try {
            const res = await fetch(`/api/bot-db/${targetId}`);
            botDB = await res.json();
            if (!botDB.customCmds) botDB.customCmds = {};
            if (!botDB.notices) botDB.notices = [];
            if (!botDB.settings) botDB.settings = {};
        } catch(e) {
            alert('DB 로드 실패');
        }

        app.innerHTML = `
            <header>
                <h1>내 방송 봇 관리</h1>
                <p>ID: ${targetId} | 실시간 봇 제어 대시보드</p>
                <br>
                <button class="btn btn-secondary" onclick="logout()">로그아웃</button>
            </header>
            
            <div class="tabs">
                <button class="tab-btn ${currentTab==='settings'?'active':''}" onclick="changeTab('settings')">⚙️ 기본 설정</button>
                <button class="tab-btn ${currentTab==='profile'?'active':''}" onclick="changeTab('profile')">📋 프로필/미션</button>
                <button class="tab-btn ${currentTab==='commands'?'active':''}" onclick="changeTab('commands')">💬 커스텀 명령어</button>
                <button class="tab-btn ${currentTab==='notices'?'active':''}" onclick="changeTab('notices')">📢 자동 안내문</button>
            </div>
            
            <div class="card" id="tabContent"></div>
        `;
        renderTabContent();
    }

    function changeTab(tab) {
        currentTab = tab;
        renderBJ(); // Re-render shell to update tab active state, then content
    }

    function renderTabContent() {
        const content = document.getElementById('tabContent');
        if (currentTab === 'settings') {
            content.innerHTML = `
                <h2 style="margin-bottom:1.5rem;">⚙️ 봇 기본 동작 설정</h2>
                
                <div class="form-group" style="display:flex; align-items:center; gap:10px;">
                    <input type="checkbox" id="set_enableCommands" ${botDB.settings.enableCommands !== false ? 'checked' : ''} style="width:20px; height:20px;">
                    <label class="form-label" style="margin:0; font-size:1.1rem;">봇 명령어 켜기 (끄면 봇이 대답 안함)</label>
                </div>
                
                <div class="form-group" style="display:flex; align-items:center; gap:10px;">
                    <input type="checkbox" id="set_autoWelcome" ${botDB.settings.autoWelcome !== false ? 'checked' : ''} style="width:20px; height:20px;">
                    <label class="form-label" style="margin:0; font-size:1.1rem;">자동 인사 켜기 (새로운 시청자 입장 시 인사)</label>
                </div>
                
                <button class="btn btn-primary" onclick="saveSettings()">설정 저장하기 (실시간 반영)</button>
                
                <hr style="border-color:var(--border-color); margin: 3rem 0;">
                <h3 style="margin-bottom:1rem; color:var(--accent-danger);">비밀번호 변경</h3>
                <div style="display:flex; gap:1rem;">
                    <input type="password" id="changePw" class="form-input" placeholder="새로운 비밀번호 입력">
                    <button class="btn btn-danger" onclick="changePassword()">비밀번호 변경</button>
                </div>
            `;
        } else if (currentTab === 'profile') {
            content.innerHTML = `
                <h2 style="margin-bottom:1.5rem;">📋 프로필 및 미션 설정</h2>
                <div class="form-group">
                    <label class="form-label">!프로필 (시청자가 !프로필 쳤을 때 나올 긴 글)</label>
                    <textarea id="profileText" class="form-input" placeholder="프로필 텍스트 입력">${botDB.settings.profileText || ''}</textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">!미션 (시청자가 !미션 쳤을 때 나올 내용)</label>
                    <textarea id="missionText" class="form-input" placeholder="현재 미션 내용 입력">${botDB.settings.missionText || ''}</textarea>
                </div>
                <button class="btn btn-primary" onclick="saveProfile()">내용 저장하기 (실시간 반영)</button>
            `;
        } else if (currentTab === 'commands') {
            let listHtml = '';
            for (let cmd in botDB.customCmds) {
                listHtml += `
                <div class="list-item">
                    <div class="list-info">
                        <strong>!${cmd}</strong> <span>${botDB.customCmds[cmd]}</span>
                    </div>
                    <button class="btn btn-danger" onclick="deleteCmd('${cmd}')">삭제</button>
                </div>`;
            }
            if (!listHtml) listHtml = '<p style="color:var(--text-muted)">등록된 커스텀 명령어가 없습니다.</p>';

            content.innerHTML = `
                <h2 style="margin-bottom:1.5rem;">💬 커스텀 명령어 관리</h2>
                <div style="display:flex; gap:1rem; margin-bottom:2rem;">
                    <input type="text" id="cmdKey" class="form-input" style="flex:1" placeholder="명령어 (예: 노래)">
                    <input type="text" id="cmdVal" class="form-input" style="flex:3" placeholder="답변 내용 (예: 스토커, 아이유...)">
                    <button class="btn btn-primary" onclick="addCmd()">추가</button>
                </div>
                ${listHtml}
            `;
        } else if (currentTab === 'notices') {
            let listHtml = '';
            botDB.notices.forEach((n, idx) => {
                listHtml += `
                <div class="list-item">
                    <div class="list-info">
                        <strong style="color:var(--accent-success)">${n.intervalMs / 60000}분 마다</strong> 
                        <span>${n.text}</span>
                    </div>
                    <button class="btn btn-danger" onclick="deleteNotice(${idx})">삭제</button>
                </div>`;
            });
            if (!listHtml) listHtml = '<p style="color:var(--text-muted)">등록된 자동 안내문이 없습니다.</p>';

            content.innerHTML = `
                <h2 style="margin-bottom:1.5rem;">📢 자동 안내문 관리</h2>
                <div style="display:flex; gap:1rem; margin-bottom:2rem;">
                    <input type="number" id="notMin" class="form-input" style="flex:1" placeholder="몇 분마다? (예: 10)">
                    <input type="text" id="notText" class="form-input" style="flex:3" placeholder="안내 텍스트 (예: 추천 즐찾 부탁드려요!)">
                    <button class="btn btn-primary" onclick="addNotice()">추가</button>
                </div>
                ${listHtml}
            `;
        }
    }

    async function saveDBToServer() {
        try {
            const res = await fetch(`/api/bot-db/${targetId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(botDB)
            });
            if (res.ok) {
                const data = await res.json();
                if (data.injected) {
                    alert('✅ 저장 및 현재 방송 중인 봇에 실시간 반영이 완료되었습니다!');
                } else {
                    alert('⚠️ 저장은 완료되었으나, 현재 봇이 방송방에 켜져 있지 않습니다.\n(다음 방송 봇 구동 시 적용됩니다.)');
                }
            } else {
                alert('저장 실패');
            }
        } catch (e) { alert('서버 연결 실패'); }
        renderTabContent();
    }

    function saveSettings() {
        botDB.settings.enableCommands = document.getElementById('set_enableCommands').checked;
        botDB.settings.autoWelcome = document.getElementById('set_autoWelcome').checked;
        saveDBToServer();
    }

    function saveProfile() {
        botDB.settings.profileText = document.getElementById('profileText').value;
        botDB.settings.missionText = document.getElementById('missionText').value;
        saveDBToServer();
    }

    function addCmd() {
        const k = document.getElementById('cmdKey').value.trim().replace(/^!/, '');
        const v = document.getElementById('cmdVal').value.trim();
        if (!k || !v) return;
        botDB.customCmds[k] = v;
        saveDBToServer();
    }

    function deleteCmd(k) {
        if (!confirm(`!${k} 명령어를 삭제하시겠습니까?`)) return;
        delete botDB.customCmds[k];
        saveDBToServer();
    }

    function addNotice() {
        const m = parseInt(document.getElementById('notMin').value);
        const t = document.getElementById('notText').value.trim();
        if (!m || !t || m < 1) return alert('정상적인 분(min)과 내용을 입력하세요.');
        botDB.notices.push({ intervalMs: m * 60000, text: t });
        saveDBToServer();
    }

    function deleteNotice(idx) {
        if (!confirm('이 안내문을 삭제하시겠습니까?')) return;
        botDB.notices.splice(idx, 1);
        saveDBToServer();
    }

    async function changePassword() {
        const pw = document.getElementById('changePw').value.trim();
        if (!pw) return alert('새 비밀번호를 입력해주세요.');
        try {
            const res = await fetch(`/api/targets/${targetId}/password`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pw })
            });
            if (res.ok) {
                alert('비밀번호가 변경되었습니다. 새 비밀번호로 다시 로그인하세요.');
                logout();
            } else alert('변경 실패');
        } catch(e) { alert('서버 오류'); }
    }

    // 초기 실행
    render();
</script>

</body>
</html>
